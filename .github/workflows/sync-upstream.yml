name: Sync EdgeSub Upstream

on:
  schedule:
    # 每天 UTC 时间 2 点（北京时间 10 点）自动同步
    - cron: "0 2 * * *"
  # 支持手动触发
  workflow_dispatch:

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          # 使用默认 Token 获取推送权限
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 添加上游仓库地址
        run: |
          git remote add upstream https://github.com/kobe-koto/EdgeSub.git
          git fetch upstream

      - name: 合并上游 main 分支到本地
        run: |
          git checkout main
          # 允许合并无关历史（防止首次同步失败）
          git merge upstream/main --allow-unrelated-histories
          # 推送更新到你的 Fork 仓库
          git push origin main
