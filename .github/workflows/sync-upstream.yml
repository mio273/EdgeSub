name: Sync EdgeSub Upstream

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: 添加上游仓库地址
        run: |
          git remote add upstream https://github.com/kobe-koto/EdgeSub.git
          git fetch upstream

      - name: 合并上游 main 分支到本地
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories
          git push origin main
